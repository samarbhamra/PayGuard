version: "3.9"

services:
  db:
    image: postgres:16
    container_name: payguard-db
    environment:
      POSTGRES_DB: payguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.1
    container_name: payguard-mlflow
    environment:
      BACKEND_STORE_URI: /mlflow
      ARTIFACT_ROOT: /mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow
      --default-artifact-root /mlflow
    volumes:
      - ./mlruns:/mlflow
    ports:
      - "5000:5000"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: payguard-api
    environment:
      PAYGUARD_DATABASE_URL: postgresql://postgres:postgres@db:5432/payguard
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./models:/app/models

volumes:
  pgdata:



